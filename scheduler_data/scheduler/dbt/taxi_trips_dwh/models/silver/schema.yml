version: 2

models:
  - name: silver_taxi_zones
    description: "Limpia taxin_zones_lookup"
    columns:
      - name: location_id
        tests:
          - not_null
          - unique

  - name: silver_trips
    description: Cleaned and unified trips dataset
    columns:
      - name: pickup_ts
        tests:
          - not_null
      - name: dropoff_ts
        tests:
          - not_null
      - name: pu_zone_id
        tests:
          - not_null
      - name: do_zone_id
        tests:
          - not_null
      - name: service_type
        tests:
          - accepted_values:
              values: ['yellow', 'green']